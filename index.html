<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="JavaScript To Do App">

<meta name="keywords" content="Todo App, JavaScript, CRUD">

<meta name="author" content="Ajay">

<title>To-Do App</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>📝 To-Do List</h1>

<div class="input-area">

<input
type="text"
id="taskInput"
placeholder="Enter a task">

<button id="addTask">
Add
</button>

</div>

<div class="filters">

<button class="filter active" data-filter="all">
All
</button>

<button class="filter" data-filter="active">
Active
</button>

<button class="filter" data-filter="completed">
Completed
</button>

</div>

<ul id="taskList">

</ul>

<div class="footer">

<p>

Total Tasks :

<span id="taskCount">

0

</span>

</p>

</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
